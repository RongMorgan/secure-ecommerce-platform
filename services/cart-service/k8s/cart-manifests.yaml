apiVersion: v1
kind: Service
metadata:
  name: cart-redis
  namespace: ecommerce
spec:
  ports:
  - port: 6379
  selector:
    app: cart-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-redis
  namespace: ecommerce
spec:
  selector:
    matchLabels:
      app: cart-redis
  template:
    metadata:
      labels:
        app: cart-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  ports:
  - port: 8080
  selector:
    app: cart-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: node:18-slim
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args: 
          - |
            # 1. Setup clean environment
            mkdir -p /app && cd /app
            rm -rf node_modules package-lock.json
            
            # 2. Write the application code
            echo 'const express = require("express"); 
            const Redis = require("ioredis"); 
            const app = express(); 
            const redis = new Redis({ host: process.env.REDIS_HOST || "cart-redis", port: 6379 }); 
            
            app.get("/health", (req, res) => res.json({ status: "healthy", service: "cart" }));
            
            app.listen(8080, () => {
              console.log("--------------------------");
              console.log("Cart Service is LIVE on 8080");
              console.log("--------------------------");
            });' > index.js;
            
            # 3. Install dependencies without lockfile conflicts
            npm install express ioredis --no-package-lock
            
            # 4. Start the service
            node index.js
        env:
        - name: REDIS_HOST
          value: "cart-redis"
        ports:
        - containerPort: 8080
