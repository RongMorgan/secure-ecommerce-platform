apiVersion: v1
kind: Service
metadata:
  name: cart-redis
  namespace: ecommerce
spec:
  ports:
  - port: 6379
  selector:
    app: cart-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-redis
  namespace: ecommerce
spec:
  selector:
    matchLabels:
      app: cart-redis
  template:
    metadata:
      labels:
        app: cart-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  ports:
  - port: 8080
  selector:
    app: cart-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: node:18-slim
        # This is the "Driver" - it tells the container what to do
        command: ["/bin/sh", "-c"]
        args: 
          - |
            echo 'const express = require("express"); const Redis = require("ioredis"); const app = express(); const redis = new Redis({ host: process.env.REDIS_HOST }); app.get("/health", (req, res) => res.json({ status: "healthy" })); app.listen(8080, () => console.log("Server ready"));' > index.js;
            npm install express ioredis;
            node index.js
        env:
        - name: REDIS_HOST
          value: "cart-redis"
