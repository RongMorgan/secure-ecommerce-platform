apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-code
  namespace: ecommerce
data:
  app.js: |
    const express = require('express');
    const app = express();
    app.use(express.json());

    app.post('/chat', (req, res) => {
      const msg = (req.body.message || "").toLowerCase();
      if(msg.includes("status")) return res.json({ reply: "ALL_SYSTEMS_NOMINAL: Database connected." });
      if(msg.includes("hello")) return res.json({ reply: "SYSTEM_READY: Greetings, Operator." });
      res.json({ reply: "UNKNOWN_COMMAND: Try typing 'status' or 'hello'." });
    });

    app.listen(8080, () => console.log('Bot Active on 8080'));
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      # Phase 1: Install dependencies in a shared volume
      initContainers:
      - name: install-deps
        image: node:18-alpine
        workingDir: /app
        command: ["sh", "-c", "npm install express"]
        volumeMounts:
        - name: app-volume
          mountPath: /app
      
      # Phase 2: Run the bot using the installed modules and ConfigMap code
      containers:
      - name: chatbot
        image: node:18-alpine
        workingDir: /app
        command: ["node", "app.js"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-volume
          mountPath: /app
        - name: code-volume
          mountPath: /app/app.js
          subPath: app.js
      
      volumes:
      - name: app-volume
        emptyDir: {}
      - name: code-volume
        configMap:
          name: chatbot-code
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: ecommerce
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: chatbot
